name: マーケ・夜X単体（熱い日のみ）

on:
  schedule:
    # 19:00 JST = 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  hot-single:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: X 夜単体（閾値以上のみ）
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: node scripts/post-hot-single.mjs
      - name: Buffer 状態更新
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: node scripts/check-buffer.mjs
        continue-on-error: true
