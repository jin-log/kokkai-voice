name: マーケ・夜X単体（熱い日のみ）

on:
  schedule:
    # 19:00 JST = 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hot-single:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: BUFFER_API_KEY 確認
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: |
          if [ -z "$BUFFER_API_KEY" ]; then
            echo "::error::BUFFER_API_KEY が GitHub Secrets に未設定です"
            exit 1
          fi

      - name: X 夜単体（閾値以上のみ）
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: node scripts/post-hot-single.mjs

      - name: Buffer 状態更新
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: node scripts/check-buffer.mjs
        continue-on-error: true

      - name: 投稿ログをコミット
        run: |
          git config user.email "bot@seiji1192.site"
          git config user.name "kokkai-bot"
          git add data/x-post-log.json data/buffer-status.json
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "marketing: 夜X単体ログ"
          git pull --rebase origin main || true
          git push || (git pull --rebase origin main && git push) || echo "push skip (concurrent)"
