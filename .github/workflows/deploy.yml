name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["新規記事作成", "記事を本番反映", "記事管理"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      slug:
        description: "記事スラグ（監査用・空可）"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    # push: 人間のコミット用。bot の git push は GITHUB_TOKEN 制限で push 連動しない。
    # workflow_run: 記事作成はゲート未達でも data/ は push 済み → 管理画面更新のため deploy する。
    if: >-
      ${{ github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || github.event.workflow_run.conclusion == 'success'
      || (github.event.workflow_run.conclusion == 'failure'
          && github.event.workflow_run.name == '新規記事作成') }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy functions into dist
        run: node scripts/copy-functions.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=kokkai-voice --commit-dirty=true

      - name: Purge Cloudflare Cache
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -o '"success":[a-z]*' || true

      - name: 検索エンジン更新通知（IndexNow + Google）
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/notify-search-engines.mjs --live
