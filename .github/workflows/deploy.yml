name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_run:
    workflows: ["新規記事作成", "記事を本番反映", "記事管理", "品質巡回（サーバー）"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      slug:
        description: "記事スラグ（監査用・空可）"
        required: false
        default: ""

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      run_deploy: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        # workflow_run トリガーで BlobNotFound が出る場合があるため fetch-depth:0 で回避
        continue-on-error: false
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # git diff が使えない場合は常にデプロイ
          if ! git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(src/|data/|public/|functions/|package|astro)'; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "定期デプロイ: 直近コミットに変更なし — スキップ（失敗通知を出さない）"
          fi

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    # push: 人間のコミット用。bot の git push は GITHUB_TOKEN 制限で push 連動しない。
    # workflow_run: 記事作成はゲート未達でも data/ は push 済み → 管理画面更新のため deploy する。
    if: >-
      needs.preflight.outputs.run_deploy == 'true'
      && (
        github.event_name == 'push'
        || github.event_name == 'workflow_dispatch'
        || github.event_name == 'schedule'
        || github.event.workflow_run.conclusion == 'success'
        || (
          github.event.workflow_run.conclusion == 'failure'
          && github.event.workflow_run.name == '新規記事作成'
        )
      )
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: 記事品質監査（公開中 — 記録のみ。管理画面・巡回反映は継続）
        run: npm run audit:articles -- --published-only

      - name: Install Japanese fonts (OGP生成)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fontconfig fonts-noto-cjk

      - name: 関心ワード取得
        run: npm run trends:fetch

      - name: Build
        run: npm run build

      - name: Copy functions into dist
        run: node scripts/copy-functions.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=kokkai-voice --commit-dirty=true

      - name: Purge Cloudflare Cache
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -o '"success":[a-z]*' || true

      - name: 検索エンジン更新通知（IndexNow + Google・未送信ゼロ必須）
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/notify-search-engines.mjs --live --ensure-all
