name: マーケ・はてなnoteキュー消化

on:
  schedule:
    # 13:00 / 21:00 JST
    - cron: "0 4,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promo-backlog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Playwright Chromium
        run: npx playwright install chromium

      - name: ブラウザセッション復元
        env:
          HATENA_BROWSER_STATE: ${{ secrets.HATENA_BROWSER_STATE }}
          NOTE_BROWSER_STATE: ${{ secrets.NOTE_BROWSER_STATE }}
        run: |
          mkdir -p secrets/browser
          if [ -z "$HATENA_BROWSER_STATE" ] || [ -z "$NOTE_BROWSER_STATE" ]; then
            echo "SKIP — browser secrets 未設定"
            echo "SKIP_SECRETS=1" >> "$GITHUB_ENV"
            exit 0
          fi
          printf '%s' "$HATENA_BROWSER_STATE" > secrets/browser/state-hatena.json
          printf '%s' "$NOTE_BROWSER_STATE" > secrets/browser/state-note.json

      - name: キュー消化（最大3件）
        if: env.SKIP_SECRETS != '1'
        run: node scripts/post-article-promo.mjs --from-queue --limit 3

      - name: ログ・キュー更新をコミット
        if: env.SKIP_SECRETS != '1'
        run: |
          git config user.email "bot@seiji1192.site"
          git config user.name "kokkai-bot"
          git add data/promo-publish-queue.json data/promo-intro-log.json
          git diff --staged --quiet || git commit -m "marketing: はてな/note キュー消化"
          git pull --rebase origin main || true
          git push || true
