name: 新規記事作成

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "スラグ (例: boei-zei)"
        required: true
      keyword:
        description: "検索キーワード (例: 防衛増税)"
        required: true
      title:
        description: "記事タイトル (例: 防衛増税 — あの話どうなった？)"
        required: true
      category:
        description: "カテゴリ"
        required: false
        default: "国会"
      tags:
        description: "タグ (カンマ区切り)"
        required: false
        default: ""
      sources:
        description: "ソースURL (カンマ区切り・任意)"
        required: false
        default: ""
  repository_dispatch:
    types: [create-article]

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    env:
      ART_SLUG:     ${{ github.event.inputs.slug     || github.event.client_payload.slug }}
      ART_KEYWORD:  ${{ github.event.inputs.keyword  || github.event.client_payload.keyword }}
      ART_TITLE:    ${{ github.event.inputs.title    || github.event.client_payload.title }}
      ART_CATEGORY: ${{ github.event.inputs.category || github.event.client_payload.category || '国会' }}
      ART_TAGS:     ${{ github.event.inputs.tags     || github.event.client_payload.tags || '' }}
      ART_SOURCES:  ${{ github.event.inputs.sources  || github.event.client_payload.sources || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: 骨組み生成
        run: |
          if [ "$ART_CATEGORY" = "国会" ]; then
            node scripts/init-article.mjs \
              --slug "$ART_SLUG" \
              --keyword "$ART_KEYWORD" \
              --title "$ART_TITLE" \
              --category "$ART_CATEGORY" \
              --tags "$ART_TAGS" \
              --force
          else
            node scripts/init-article-general.mjs \
              --slug "$ART_SLUG" \
              --keyword "$ART_KEYWORD" \
              --title "$ART_TITLE" \
              --category "$ART_CATEGORY" \
              --tags "$ART_TAGS" \
              --sources "$ART_SOURCES" \
              --force
          fi

      - name: index登録
        run: node scripts/register-article-index.mjs --slug "$ART_SLUG"

      - name: 作成ログ
        run: |
          node scripts/log-article-create.mjs \
            --slug "$ART_SLUG" \
            --keyword "$ART_KEYWORD" \
            --title "$ART_TITLE" \
            --category "$ART_CATEGORY" \
            --via github-actions \
            --status done

      - name: 記事完成（①〜④ 自動）
        id: complete
        continue-on-error: true
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/complete-article.mjs --slug "$ART_SLUG"

      - name: コミット & プッシュ
        run: |
          git config user.email "bot@seiji1192.site"
          git config user.name "kokkai-bot"
          git add data/
          git diff --staged --quiet || git commit -m "article: $ART_SLUG 自動完成"
          git pull --rebase origin main
          git push

      - name: 公開ゲート確認
        if: steps.complete.outcome != 'success'
        run: |
          echo "①〜④のいずれかが未達です。管理画面で未了項目を確認してください。"
          exit 1
