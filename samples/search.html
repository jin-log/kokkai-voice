<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索｜日本の政治なう</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner site-header__inner--search">
      <a class="logo" href="index.html">
        <img class="logo__img" src="assets/logo-header-nihon-seiji-naw.png" alt="日本の政治なう — あの話どうなった？" width="520" height="130">
      </a>
      <form class="site-search" data-search-form role="search" action="search.html" method="get">
        <label class="visually-hidden" for="q">案件を検索</label>
        <input id="q" class="site-search__input" type="search" name="q" data-search-input placeholder="物価高、都知事、リコール…" autocomplete="off">
        <button type="submit" class="site-search__btn">検索</button>
      </form>
    </div>
  </header>

  <main class="container search-page">
    <h1 class="search-page__title">案件を探す</h1>
    <p class="search-page__lead" data-search-meta>読み込み中…</p>

    <div class="category-chips" role="group" aria-label="カテゴリで絞り込み" data-category-chips>
      <button type="button" class="category-chip category-chip--active" data-category="">すべて</button>
      <button type="button" class="category-chip" data-category="経済">経済</button>
      <button type="button" class="category-chip" data-category="社会保障">社会保障</button>
      <button type="button" class="category-chip" data-category="外交">外交</button>
      <button type="button" class="category-chip" data-category="都政">都政</button>
      <button type="button" class="category-chip" data-category="国会">国会</button>
      <button type="button" class="category-chip" data-category="リコール">リコール</button>
    </div>

    <div class="sort-bar">
      <div class="sort-tabs" role="tablist" aria-label="並び替え">
        <button type="button" class="sort-tab sort-tab--active" data-sort="heat" role="tab" aria-selected="true" title="😊＋😠・コメント×2・直近7日PV">関心順</button>
        <button type="button" class="sort-tab" data-sort="trend" role="tab" aria-selected="false" title="直近48h/7日の投票・追記・X引用の伸び">話題順</button>
        <button type="button" class="sort-tab" data-sort="new" role="tab" aria-selected="false" title="案件ページの最終更新日">新着</button>
        <button type="button" class="sort-tab" data-sort="chrono" role="tab" aria-selected="false" title="案件開始日（古い→新しい）">時系列</button>
      </div>
      <p class="sort-hint" data-sort-desc aria-live="polite"></p>
    </div>

    <div class="search-results" data-search-results></div>
  </main>

  <footer class="site-footer">
    <p>サンプル — ソートはデモ用スコア。本番は D1 + Workers API。</p>
  </footer>
  <script src="js/search.js"></script>
</body>
</html>
